<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Cedar Point Route</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:   #0b1e3a;
  --red:    #d4142b;
  --bg:     #f1f3f6;
  --card:   #ffffff;
  --muted:  #6b7280;
  --walk:   #1e40af;
  --done:   #15803d;
  --warn:   #b45309;
  --radius: 16px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: #0d1117;
  height: 100dvh; display: flex; flex-direction: column;
  overflow: hidden; -webkit-tap-highlight-color: transparent; user-select: none;
}
header {
  background: var(--navy); color: #fff;
  padding: 0 16px; padding-top: env(safe-area-inset-top, 12px);
  height: calc(52px + env(safe-area-inset-top, 0px));
  display: flex; align-items: flex-end; padding-bottom: 10px;
  justify-content: space-between; flex-shrink: 0; z-index: 10;
}
.app-name { font-size: 17px; font-weight: 800; letter-spacing: -.2px; }
.gps-pill {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 500;
  background: rgba(255,255,255,.12); border-radius: 99px; padding: 5px 10px;
}
.gps-pip { width: 7px; height: 7px; border-radius: 50%; background: #6b7280; flex-shrink: 0; transition: background .4s; }
.gps-pip.active    { background: #4ade80; }
.gps-pip.searching { background: #fbbf24; animation: blink 1.1s infinite; }
.gps-pip.plan      { background: #818cf8; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
.plan-btn {
  background: rgba(255,255,255,.13); border: none; border-radius: 99px;
  color: rgba(255,255,255,.85); font-size: 12px; font-weight: 700;
  padding: 5px 12px; cursor: pointer; letter-spacing: .2px; margin-right: 4px;
  transition: background .15s;
}
.plan-btn:active      { background: rgba(255,255,255,.25); }
.plan-btn.plan-active { background: #4f46e5; color: #fff; }
.plan-bar { background: #162d4a; overflow: hidden; max-height: 0; transition: max-height .25s ease; flex-shrink: 0; }
.plan-bar.open { max-height: 56px; }
.plan-bar-inner { display: flex; align-items: center; gap: 10px; padding: 10px 16px; }
.plan-bar-lbl { color: rgba(255,255,255,.6); font-size: 12px; font-weight: 600; white-space: nowrap; }
.plan-input {
  flex: 1; min-width: 0; background: rgba(255,255,255,.12); border: none;
  border-radius: 10px; color: #fff; font-size: 14px; font-weight: 600;
  padding: 6px 10px; outline: none; color-scheme: dark;
}
.plan-live-btn {
  background: rgba(255,255,255,.18); border: none; border-radius: 8px;
  color: #fff; font-size: 12px; font-weight: 700;
  padding: 6px 12px; cursor: pointer; white-space: nowrap;
}
.plan-live-btn:active { background: rgba(255,255,255,.32); }
#scrollArea {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  overscroll-behavior: contain; -webkit-overflow-scrolling: touch; padding-bottom: 16px;
}
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100%; padding: 40px 32px; text-align: center; gap: 14px;
}
.empty-icon  { font-size: 72px; line-height: 1; }
.empty-title { font-size: 24px; font-weight: 800; }
.empty-sub   { font-size: 15px; color: var(--muted); line-height: 1.5; }
.empty-cta {
  margin-top: 8px; background: var(--red); color: #fff; border: none;
  border-radius: 14px; padding: 18px 0; width: 100%; max-width: 260px;
  font-size: 17px; font-weight: 700; cursor: pointer;
}
.hero-card { background: var(--card); margin: 12px 12px 0; border-radius: var(--radius); overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.1); }
.hero-accent { background: var(--red); padding: 10px 16px 8px; display: flex; align-items: center; justify-content: space-between; }
.hero-label { font-size: 11px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; color: rgba(255,255,255,.75); }
.hero-spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: none; }
.hero-spinner.show { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }
.hero-name { font-size: 30px; font-weight: 800; letter-spacing: -.5px; padding: 12px 16px 0; line-height: 1.1; }
.hero-chips { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px 16px; }
.chip { background: var(--bg); border-radius: 12px; padding: 9px 11px; }
.chip-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 3px; }
.chip-val { font-size: 17px; font-weight: 700; }
.chip-val.walk { color: var(--walk); }
.chip-val.wait { color: var(--warn); }
.hero-done { display: flex; border-top: 1px solid #f0f0f0; }
.hero-done-btn { flex: 1; padding: 16px; background: var(--done); color: #fff; border: none; font-size: 17px; font-weight: 700; cursor: pointer; transition: background .12s; }
.hero-done-btn:active { background: #166534; }
.hero-remove-btn { padding: 16px 18px; background: none; border: none; border-left: 1px solid #f0f0f0; color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: background .12s, color .12s; }
.hero-remove-btn:active { background: #fee2e2; color: var(--red); }
.walk-thread { display: flex; align-items: center; gap: 10px; padding: 6px 20px; color: var(--walk); font-size: 12px; font-weight: 600; }
.walk-thread-line { width: 1px; height: 20px; background: #93c5fd; flex-shrink: 0; }
.upcoming-header { padding: 10px 16px 4px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
.stop-card { background: var(--card); margin: 0 12px; border-radius: var(--radius); display: flex; align-items: center; padding: 12px 12px 12px 14px; gap: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.07); margin-bottom: 4px; }
.stop-badge { background: var(--navy); color: #fff; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.stop-info { flex: 1; min-width: 0; }
.stop-name { font-size: 15px; font-weight: 700; }
.stop-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.stop-remove { background: none; border: none; color: #d1d5db; font-size: 22px; cursor: pointer; padding: 4px 6px; line-height: 1; border-radius: 8px; flex-shrink: 0; transition: color .12s, background .12s; }
.stop-remove:active { background: #fee2e2; color: var(--red); }
.last-stop-note { text-align: center; padding: 16px; font-size: 13px; color: var(--muted); font-style: italic; }
.cmp-card { background: var(--card); margin: 8px 12px 4px; border-radius: var(--radius); padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
.cmp-headline { font-size: 14px; font-weight: 700; margin-bottom: 11px; display: flex; align-items: center; gap: 6px; }
.cmp-savings { color: var(--done); }
.cmp-neutral { color: var(--muted); font-weight: 600; }
.cmp-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.cmp-table th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); text-align: right; padding: 2px 8px 5px; }
.cmp-table th:first-child { text-align: left; }
.cmp-table td { text-align: right; padding: 4px 8px; }
.cmp-table td:first-child { text-align: left; font-weight: 600; color: var(--muted); font-size: 12px; }
.cmp-table tr.ours td { font-weight: 700; color: #0d1117; }
.cmp-table tr.ours td:first-child { color: var(--done); }
.cmp-table tr.naive td { color: #9ca3af; }
.bottom-bar { background: var(--card); border-top: 1px solid #e5e7eb; padding: 10px 16px; padding-bottom: max(10px, env(safe-area-inset-bottom, 10px)); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-shrink: 0; }
.eta-block { line-height: 1.3; }
.eta-time { font-size: 18px; font-weight: 800; }
.eta-sub  { font-size: 12px; color: var(--muted); }
.fab { background: var(--red); color: #fff; border: none; border-radius: 14px; padding: 13px 20px; font-size: 15px; font-weight: 700; cursor: pointer; flex-shrink: 0; box-shadow: 0 3px 10px rgba(212,20,43,.35); transition: background .12s; }
.fab:active { background: #b91c1c; }
.sheet-bg { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; opacity: 0; pointer-events: none; transition: opacity .25s; }
.sheet-bg.open { opacity: 1; pointer-events: all; }
.sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-radius: 22px 22px 0 0; z-index: 201; max-height: 82dvh; display: flex; flex-direction: column; transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1); padding-bottom: env(safe-area-inset-bottom, 0px); }
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 44px; height: 4px; background: #d1d5db; border-radius: 99px; margin: 12px auto 0; flex-shrink: 0; }
.sheet-toprow { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 6px; flex-shrink: 0; }
.sheet-title { font-size: 18px; font-weight: 800; }
.sheet-close-btn { background: #f3f4f6; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 20px; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; }
.sheet-hint { padding: 0 16px 12px; font-size: 13px; color: var(--muted); }
.sheet-scroll { overflow-y: auto; padding: 0 12px 24px; flex: 1; }
.ride-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ride-tile { background: var(--bg); border: 2px solid transparent; border-radius: 14px; padding: 12px 11px; cursor: pointer; position: relative; transition: border-color .1s, transform .1s, background .1s; }
.ride-tile:active { transform: scale(.94); }
.ride-tile.added  { border-color: var(--red); background: #fff5f5; }
.ride-tile-name   { font-size: 14px; font-weight: 700; margin-bottom: 4px; line-height: 1.25; }
.ride-tile-wait   { font-size: 12px; color: var(--muted); }
.ride-tile-wait.long { color: var(--warn); font-weight: 600; }
.tile-badge { position: absolute; top: -7px; right: -7px; background: var(--red); color: #fff; border-radius: 99px; padding: 2px 7px; font-size: 11px; font-weight: 700; border: 2px solid var(--card); }
</style>
</head>
<body>

<header>
  <div class="app-name">🎢 Cedar Point</div>
  <div style="display:flex;align-items:center;gap:6px">
    <button class="plan-btn" id="planBtn" onclick="togglePlan()">Plan</button>
    <div class="gps-pill">
      <div class="gps-pip searching" id="gpsPip"></div>
      <span id="gpsLbl">GPS…</span>
    </div>
  </div>
</header>

<div class="plan-bar" id="planBar">
  <div class="plan-bar-inner">
    <span class="plan-bar-lbl">Route for</span>
    <input type="datetime-local" class="plan-input" id="planInput" oninput="onPlanTimeChange()">
    <button class="plan-live-btn" onclick="clearPlan()">Go Live</button>
  </div>
</div>

<div id="scrollArea"></div>

<div class="bottom-bar">
  <div class="eta-block">
    <div class="eta-time" id="etaTime">—</div>
    <div class="eta-sub"  id="etaSub">add rides to start</div>
  </div>
  <button class="fab" onclick="openSheet()">+ Add Ride</button>
</div>

<div class="sheet-bg" id="sheetBg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-toprow">
    <div class="sheet-title">Add a Ride</div>
    <button class="sheet-close-btn" onclick="closeSheet()">×</button>
  </div>
  <div class="sheet-hint">Tap to add. Estimates based on historical data for the current hour.</div>
  <div class="sheet-scroll">
    <div class="ride-grid" id="rideGrid"></div>
  </div>
</div>

// ═══════════════════════════════════════════════════════════════════════════
//  ALGORITHM
// ═══════════════════════════════════════════════════════════════════════════

const WALK_SPEED = 1.2;   // m/s
const BREAK_S    = 120;   // seconds cooldown after each ride
function haversine(la1, lo1, la2, lo2) {
  const R = 6371000, r = Math.PI / 180;
  const dLa = (la2-la1)*r, dLo = (lo2-lo1)*r;
  const a = Math.sin(dLa/2)**2 + Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dLo/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function walkDist(idA, laA, loA, idB, laB, loB) {
  if (idA === idB) return 50;
  const k = Math.min(idA,idB) + '_' + Math.max(idA,idB);
  return MANUAL[k] ?? haversine(laA, loA, laB, loB) * 1.25;
}

function forecastWait(id, baseMs, offsetS) {
  const t = new Date(baseMs + offsetS * 1000);
  const hr = t.getHours(), dw = t.getDay(), mo = t.getMonth();
  const model = RIDE_MODEL[id];
  if (!model) return 5 * 60;
  const hKeys = Object.keys(model.h).map(Number);
  const nearH = hKeys.reduce((a, b) => Math.abs(b-hr) < Math.abs(a-hr) ? b : a);
  const fh = model.h[nearH] ?? 1;
  const fd = model.d[dw]    ?? 1;
  const fm = model.m[mo]    ?? 1;
  return Math.round(model.mu * fh * fd * fm * 60);
}

function evalPerm(perm, uLa, uLo, baseMs) {
  if (!perm.length) return { cost:0, steps:[] };
  const steps = [];
  let t=0, prevId=null, prevLa=uLa, prevLo=uLo;
  for (const ride of perm) {
    const d = prevId===null
      ? haversine(prevLa,prevLo,ride.lat,ride.lon)*1.25
      : walkDist(prevId,prevLa,prevLo,ride.id,ride.lat,ride.lon);
    const wS = d/WALK_SPEED, t0=t+wS;
    const wait = forecastWait(ride.id, baseMs, t0);
    const t1 = t0+wait+ride.dur+BREAK_S;
    steps.push({ rideId:ride.id, name:ride.name,
      walkMin:wS/60, arrOff:t0, brdOff:t0+wait,
      exitOff:t0+wait+ride.dur, waitS:wait });
    t=t1; prevId=ride.id; prevLa=ride.lat; prevLo=ride.lon;
  }
  return { cost: steps[steps.length-1].exitOff, steps };
}

function canonicalPerm(rides) {
  const bkt = {};
  for (const r of rides) { (bkt[r.id] ??= []).push(r); }
  const out = [];
  for (const cid of CANONICAL_ORDER) {
    const b = bkt[cid]; if (b?.length) out.push(b.shift());
  }
  for (const arr of Object.values(bkt)) out.push(...arr);
  return out;
}

function greedyPerm(rides, uLa, uLo, baseMs) {
  let rem=[...rides], curId=null, curLa=uLa, curLo=uLo, t=0;
  const out=[];
  while (rem.length) {
    let best=null, bd=Infinity;
    for (const r of rem) {
      const d = curId===null
        ? haversine(curLa,curLo,r.lat,r.lon)*1.25
        : walkDist(curId,curLa,curLo,r.id,r.lat,r.lon);
      if (d<bd) { bd=d; best=r; }
    }
    const wS=bd/WALK_SPEED, t0=t+wS, wait=forecastWait(best.id,baseMs,t0);
    t=t0+wait+best.dur+BREAK_S; curId=best.id; curLa=best.lat; curLo=best.lon;
    out.push(best); rem=rem.filter(r=>r!==best);
  }
  return out;
}

function localSearch(start, uLa, uLo, baseMs) {
  let best=[...start], bestCost=evalPerm(best,uLa,uLo,baseMs).cost;
  const n=best.length;
  let improved=true;
  while (improved) {
    improved=false;
    // Or-opt-1: relocate single ride
    oo1: for (let i=0;i<n;i++) {
      const ride=best[i], rest=[...best.slice(0,i),...best.slice(i+1)];
      for (let j=0;j<=rest.length;j++) {
        if (j===i) continue;
        const cand=[...rest.slice(0,j),ride,...rest.slice(j)];
        const {cost}=evalPerm(cand,uLa,uLo,baseMs);
        if (cost<bestCost-1) { best=cand; bestCost=cost; improved=true; break oo1; }
      }
    }
    if (improved) continue;
    // Or-opt-2: relocate consecutive pair (forward order)
    oo2: for (let i=0;i<n-1;i++) {
      const pair=[best[i],best[i+1]], rest=[...best.slice(0,i),...best.slice(i+2)];
      for (let j=0;j<=rest.length;j++) {
        if (j===i) continue;
        const cand=[...rest.slice(0,j),...pair,...rest.slice(j)];
        const {cost}=evalPerm(cand,uLa,uLo,baseMs);
        if (cost<bestCost-1) { best=cand; bestCost=cost; improved=true; break oo2; }
      }
    }
    if (improved) continue;
    // Or-opt-2r: same but insert pair in reversed order (B,A instead of A,B)
    // time-varying waits mean pair order matters independently of position
    oo2r: for (let i=0;i<n-1;i++) {
      const pair=[best[i+1],best[i]], rest=[...best.slice(0,i),...best.slice(i+2)];
      for (let j=0;j<=rest.length;j++) {
        const cand=[...rest.slice(0,j),...pair,...rest.slice(j)];
        const {cost}=evalPerm(cand,uLa,uLo,baseMs);
        if (cost<bestCost-1) { best=cand; bestCost=cost; improved=true; break oo2r; }
      }
    }
    if (improved) continue;
    // Or-opt-3: relocate consecutive triple as a block
    oo3: for (let i=0;i<n-2;i++) {
      const triple=[best[i],best[i+1],best[i+2]], rest=[...best.slice(0,i),...best.slice(i+3)];
      for (let j=0;j<=rest.length;j++) {
        if (j===i) continue;
        const cand=[...rest.slice(0,j),...triple,...rest.slice(j)];
        const {cost}=evalPerm(cand,uLa,uLo,baseMs);
        if (cost<bestCost-1) { best=cand; bestCost=cost; improved=true; break oo3; }
      }
    }
    if (improved) continue;
    // 2-opt: swap any two positions
    sw: for (let i=0;i<n;i++) for (let j=i+1;j<n;j++) {
      const cand=[...best]; [cand[i],cand[j]]=[cand[j],cand[i]];
      const {cost}=evalPerm(cand,uLa,uLo,baseMs);
      if (cost<bestCost-1) { best=cand; bestCost=cost; improved=true; break sw; }
    }
    if (improved) continue;
    // Segment reversal: reverse any subsequence of length 3+
    // Catches topologies unreachable by any relocate or swap
    rev: for (let i=0;i<n-2;i++) for (let j=i+2;j<n;j++) {
      const cand=[...best.slice(0,i),...best.slice(i,j+1).reverse(),...best.slice(j+1)];
      const {cost}=evalPerm(cand,uLa,uLo,baseMs);
      if (cost<bestCost-1) { best=cand; bestCost=cost; improved=true; break rev; }
    }
  }
  return best;
}

function findRoute(uLa, uLo, rides, baseMs) {
  if (!rides.length) return [];
  const best = localSearch(canonicalPerm(rides), uLa, uLo, baseMs);
  return evalPerm(best, uLa, uLo, baseMs).steps;
}

function greedyRoute(uLa, uLo, rides, baseMs) {
  return evalPerm(greedyPerm(rides, uLa, uLo, baseMs), uLa, uLo, baseMs).steps;
}

function summarize(steps) {
  if (!steps.length) return {tot:0,walk:0,wait:0,ride:0};
  return {
    tot:  +(steps[steps.length-1].exitOff/60).toFixed(1),
    walk: +(steps.reduce((s,x)=>s+x.walkMin,0)).toFixed(1),
    wait: +(steps.reduce((s,x)=>s+x.waitS/60,0)).toFixed(1),
    ride: +(steps.reduce((s,x)=>s+(x.exitOff-x.brdOff)/60,0)).toFixed(1),
  };
}

//  APP STATE

let myRides   = [];   // [{id, name, uid}]
let routeData = null;
let routeUids = [];
let gpsPos    = null;
let uidSeq    = 0;
let buildTmr  = null;
let isBuilding= false;
let planMode  = false;
let planTime  = null;

const PARK_LAT = 41.4793;
const PARK_LON = -82.6850;

// ═══════════════════════════════════════════════════════════════════════════
//  PLAN MODE
// ═══════════════════════════════════════════════════════════════════════════

function togglePlan() {
  if (planMode) { clearPlan(); return; }
  planMode = true;
  const d = new Date(); d.setDate(d.getDate()+1); d.setHours(10,0,0,0);
  const iso = d.toISOString().slice(0,16);
  document.getElementById('planInput').value = iso;
  planTime = iso;
  document.getElementById('planBar').classList.add('open');
  document.getElementById('planBtn').classList.add('plan-active');
  document.getElementById('planBtn').textContent = 'Planning';
  syncGpsPill();
  scheduleBuild(250);
}

function clearPlan() {
  planMode = false; planTime = null;
  document.getElementById('planBar').classList.remove('open');
  document.getElementById('planBtn').classList.remove('plan-active');
  document.getElementById('planBtn').textContent = 'Plan';
  syncGpsPill();
  scheduleBuild(250);
}

function onPlanTimeChange() {
  planTime = document.getElementById('planInput').value || null;
  syncGpsPill();
  scheduleBuild(600);
}

function syncGpsPill() {
  const pip = document.getElementById('gpsPip');
  const lbl = document.getElementById('gpsLbl');
  if (planMode && planTime) {
    const d = new Date(planTime);
    pip.className = 'gps-pip plan';
    lbl.textContent = d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) +
                      ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  } else if (planMode) {
    pip.className = 'gps-pip plan';
    lbl.textContent = 'Pick a time';
  } else if (gpsPos) {
    pip.className = 'gps-pip active';
  } else {
    pip.className = 'gps-pip searching';
    lbl.textContent = 'GPS…';
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//  GPS
// ═══════════════════════════════════════════════════════════════════════════

function dist(a,b,c,d) {
  const R=6371000,r=Math.PI/180,dL=(c-a)*r,dO=(d-b)*r;
  const x=Math.sin(dL/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function initGPS() {
  const pip=document.getElementById('gpsPip'), lbl=document.getElementById('gpsLbl');
  if (!navigator.geolocation) { lbl.textContent='No GPS'; pip.className='gps-pip'; return; }
  navigator.geolocation.watchPosition(pos => {
    const {latitude:la,longitude:lo,accuracy:acc}=pos.coords;
    const moved = gpsPos && dist(la,lo,gpsPos.lat,gpsPos.lon)>30;
    gpsPos = {lat:la,lon:lo};
    if (!planMode) {
      pip.className='gps-pip active';
      lbl.textContent='GPS ±'+Math.round(acc)+'m';
      if (moved) scheduleBuild(1200);
    }
  }, ()=>{ if (!planMode) { pip.className='gps-pip'; lbl.textContent='No GPS'; } },
  {enableHighAccuracy:true, maximumAge:12000, timeout:30000});
}

// ═══════════════════════════════════════════════════════════════════════════
//  RIDE LIST
// ═══════════════════════════════════════════════════════════════════════════

function renderGrid() {
  const g=document.getElementById('rideGrid'); g.innerHTML='';
  const now=new Date(), baseMs=now.getTime();
  for (const [idStr, name] of Object.entries(RIDE_NAMES)) {
    const id=+idStr, n=myRides.filter(r=>r.id===id).length;
    const wait=Math.round(forecastWait(id, baseMs, 0) / 60);
    const tile=document.createElement('div');
    tile.className='ride-tile'+(n>0?' added':'');
    tile.onclick=()=>addRide({id,name});
    const wCls=wait>=45?'long':'';
    tile.innerHTML=`<div class="ride-tile-name">${name}</div>`+
      `<div class="ride-tile-wait ${wCls}">~${wait} min est.</div>`+
      (n>0?`<div class="tile-badge">×${n}</div>`:'');
    g.appendChild(tile);
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//  RIDE MANAGEMENT
// ═══════════════════════════════════════════════════════════════════════════

function addRide(ride) {
  myRides.push({id:ride.id, name:ride.name, uid:uidSeq++});
  renderGrid(); scheduleBuild(250); render();
}

function removeRide(u) {
  myRides=myRides.filter(r=>r.uid!==u);
  renderGrid(); scheduleBuild(250); render();
}

// ═══════════════════════════════════════════════════════════════════════════
//  ROUTE BUILDING (local — no server)
// ═══════════════════════════════════════════════════════════════════════════

function scheduleBuild(ms) { clearTimeout(buildTmr); buildTmr=setTimeout(buildRoute,ms); }

function buildRoute() {
  if (!myRides.length) { routeData=null; routeUids=[]; render(); return; }

  let uLa, uLo, baseMs;
  if (planMode && planTime) {
    uLa=PARK_LAT; uLo=PARK_LON; baseMs=new Date(planTime).getTime();
  } else {
    uLa=gpsPos?.lat??PARK_LAT; uLo=gpsPos?.lon??PARK_LON; baseMs=Date.now();
  }

  isBuilding=true; showSpinner(true); render();

  // Defer so the spinner has a chance to paint before the CPU work starts
  setTimeout(() => {
    try {
      const rides = myRides.map(r=>({
        id:r.id, name:r.name,
        dur: RIDE_DURATIONS[r.id],
        lat: RIDE_GPS[r.id][0],
        lon: RIDE_GPS[r.id][1],
      }));

      const steps  = findRoute(uLa, uLo, rides, baseMs);
      const gSteps = greedyRoute(uLa, uLo, rides, baseMs);
      const oSum   = summarize(steps);
      const gSum   = summarize(gSteps);

      const fmtT = off => new Date(baseMs+off*1000)
        .toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});

      routeData = {
        total_minutes: oSum.tot,
        route: steps.map(s=>({
          ride_id: s.rideId, name: s.name,
          walk_minutes: +s.walkMin.toFixed(1),
          arrive: fmtT(s.arrOff), board: fmtT(s.brdOff), exit: fmtT(s.exitOff),
          wait_minutes: +(s.waitS/60).toFixed(1),
        })),
        comparison: {
          optimized: {total_minutes:oSum.tot,walk_minutes:oSum.walk,wait_minutes:oSum.wait,ride_minutes:oSum.ride},
          greedy:    {total_minutes:gSum.tot,walk_minutes:gSum.walk,wait_minutes:gSum.wait,ride_minutes:gSum.ride},
          saved_minutes: +((gSum.tot-oSum.tot).toFixed(1)),
        },
      };
      routeUids = mapUids(routeData.route.map(s=>s.ride_id));
    } catch(e) { console.error(e); }
    finally { isBuilding=false; showSpinner(false); render(); }
  }, 20);
}

function mapUids(ids) {
  const pool=[...myRides];
  return ids.map(id=>{
    const i=pool.findIndex(r=>r.id===id);
    if (i<0) return -1;
    const u=pool[i].uid; pool.splice(i,1); return u;
  });
}

function showSpinner(on) { document.getElementById('heroSpinner')?.classList.toggle('show',on); }

// ═══════════════════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════════════════

function render() {
  const area=document.getElementById('scrollArea');

  if (!myRides.length) {
    document.getElementById('etaTime').textContent='—';
    document.getElementById('etaSub').textContent='add rides to start';
    area.innerHTML=`<div class="empty-state">
      <div class="empty-icon">🎢</div>
      <div class="empty-title">Build your route</div>
      <div class="empty-sub">Add the coasters you want to hit and we'll find the fastest order — live GPS keeps it updated as you move.</div>
      <button class="empty-cta" onclick="openSheet()">+ Add Rides</button>
    </div>`;
    return;
  }

  if (!routeData) {
    document.getElementById('etaTime').textContent='…';
    document.getElementById('etaSub').textContent='optimizing';
    area.innerHTML=`<div class="hero-card">
      <div class="hero-accent"><span class="hero-label">Next Stop</span>
        <div class="hero-spinner show" id="heroSpinner"></div></div>
      <div class="hero-name" style="color:#9ca3af;padding:16px">${myRides[0].name}</div>
      <div class="hero-done"><button class="hero-done-btn" style="background:#9ca3af" disabled>Building route…</button></div>
    </div>`;
    return;
  }

  const steps=routeData.route, first=steps[0], rest=steps.slice(1), last=steps[steps.length-1];
  document.getElementById('etaTime').textContent=last.exit;
  document.getElementById('etaSub').textContent=`done (${Math.round(routeData.total_minutes)} min total)`;

  let html=`<div class="hero-card">
    <div class="hero-accent"><span class="hero-label">Next Stop</span>
      <div class="hero-spinner${isBuilding?' show':''}" id="heroSpinner"></div></div>
    <div class="hero-name">${first.name}</div>
    <div class="hero-chips">
      <div class="chip"><div class="chip-lbl">🚶 Walk</div><div class="chip-val walk">${first.walk_minutes.toFixed(1)} min</div></div>
      <div class="chip"><div class="chip-lbl">Arrive</div><div class="chip-val">${first.arrive}</div></div>
      <div class="chip"><div class="chip-lbl">⏳ Wait</div><div class="chip-val wait">${first.wait_minutes} min</div></div>
      <div class="chip"><div class="chip-lbl">Exit</div><div class="chip-val">${first.exit}</div></div>
    </div>
    <div class="hero-done">
      <button class="hero-done-btn" id="heroDone">Done ✓</button>
      <button class="hero-remove-btn" id="heroSkip">Skip</button>
    </div>
  </div>`;

  if (rest.length) {
    html+=`<div class="upcoming-header">Coming Up</div>`;
    rest.forEach((s,i)=>{
      html+=`<div class="walk-thread"><div class="walk-thread-line"></div>🚶 ${s.walk_minutes.toFixed(1)} min walk</div>
      <div class="stop-card">
        <div class="stop-badge">${i+2}</div>
        <div class="stop-info">
          <div class="stop-name">${s.name}</div>
          <div class="stop-meta">Arrive ${s.arrive} · ${s.wait_minutes}m wait · Exit ${s.exit}</div>
        </div>
        <button class="stop-remove" data-uid="${routeUids[i+1]}">×</button>
      </div>`;
    });
  } else {
    html+=`<div class="last-stop-note">Last stop on your route 🏁</div>`;
  }

  const cmp=routeData.comparison;
  if (cmp) {
    const saved=cmp.saved_minutes;
    const headline = saved>0.5
      ? `⚡ <span class="cmp-savings">${Math.round(saved)} min faster</span> than nearest-first`
      : saved<-0.5
        ? `Nearest-first would be <span class="cmp-neutral">${Math.round(-saved)} min faster</span> here`
        : `<span class="cmp-neutral">Matches nearest-first</span> on this layout`;
    const o=cmp.optimized, g=cmp.greedy;
    html+=`<div class="cmp-card">
      <div class="cmp-headline">${headline}</div>
      <table class="cmp-table">
        <tr><th></th><th>Walk</th><th>Wait</th><th>Ride</th><th>Total</th></tr>
        <tr class="ours"><td>Ours</td><td>${Math.round(o.walk_minutes)}m</td><td>${Math.round(o.wait_minutes)}m</td><td>${Math.round(o.ride_minutes)}m</td><td>${Math.round(o.total_minutes)}m</td></tr>
        <tr class="naive"><td>Nearest</td><td>${Math.round(g.walk_minutes)}m</td><td>${Math.round(g.wait_minutes)}m</td><td>${Math.round(g.ride_minutes)}m</td><td>${Math.round(g.total_minutes)}m</td></tr>
      </table>
    </div>`;
  }

  area.innerHTML=html;
  document.getElementById('heroDone').onclick=()=>removeRide(routeUids[0]);
  document.getElementById('heroSkip').onclick=()=>removeRide(routeUids[0]);
  area.querySelectorAll('.stop-remove').forEach(btn=>
    btn.addEventListener('click',()=>removeRide(Number(btn.dataset.uid))));
}

function openSheet()  { document.getElementById('sheetBg').classList.add('open'); document.getElementById('sheet').classList.add('open'); }
function closeSheet() { document.getElementById('sheetBg').classList.remove('open'); document.getElementById('sheet').classList.remove('open'); }

render();
initGPS();
renderGrid();
// Refresh wait estimates and rebuild route every 5 minutes while in use
setInterval(() => { renderGrid(); if (myRides.length) scheduleBuild(0); }, 5*60*1000);
</script>
